<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Eventos</title>
    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    
    <main>
        <h2>Gerenciador de Eventos</h2>

        <form id="formulario">
            <input type="text" id="nomeEvento" placeholder="Nome do Evento" required>

            <input type="date" id="dataEvento">

            <button type="submit">Adicionar Evento</button>
        </form>

        <ul id="lista">
            <!-- Os Eventos serão adicionados aqui por JavaScript -->
        </ul>
    </main>

</body>

<!-- JS -->
<script src="./js/app.js"></script>

</html>
